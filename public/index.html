<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚔️ Dungeon RPG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════ LAYOUT ═══ -->
<div class="game-layout">

  <!-- Header ─────────────────────────────────────────────────────────── -->
  <header class="game-header panel">
    <span class="header-title">⚔ DUNGEON RPG</span>
    <span class="header-floor">ANDAR&nbsp;<span id="floor-display">—</span></span>
    <span class="header-dot" id="conn-dot" title="Desconectado">●</span>
  </header>

  <!-- Main area ───────────────────────────────────────────────────────── -->
  <main class="game-main panel">

    <!-- Name screen -->
    <div id="name-screen" class="screen">
      <div class="name-form">
        <div class="name-title">⚔ DUNGEON RPG ⚔</div>
        <div class="name-subtitle">Crie seu herói e adentre a masmorra</div>
        <input id="name-input" class="pixel-input" type="text"
               maxlength="20" placeholder="Nome do herói..." autocomplete="off" />
        <button id="name-submit-btn" class="choice-btn standalone">▶ COMEÇAR AVENTURA</button>
        <div class="name-hint">Pressione Enter para iniciar</div>
      </div>
    </div>

    <!-- Game screen -->
    <div id="game-screen" class="screen hidden">

      <!-- Room header -->
      <div id="room-display" class="room-display">
        <span class="room-icon">🚪</span>
        <span class="room-desc">Aguardando...</span>
      </div>

      <!-- Enemy arena -->
      <div id="enemy-area" class="enemy-area"></div>

      <!-- Action buttons / prompts -->
      <div id="action-area" class="action-area"></div>

    </div>
  </main>

  <!-- Sidebar — character panel ──────────────────────────────────────── -->
  <aside class="game-sidebar panel">
    <div class="panel-title">🧝 PERSONAGEM</div>

    <div class="char-portrait" id="char-portrait">🧝</div>
    <div id="player-name"  class="char-name">—</div>
    <div id="player-level" class="char-level">Lv.1</div>

    <div class="stat-bars">
      <div class="bar-row">
        <span class="bar-label">HP</span>
        <div class="bar-track">
          <div id="hp-bar-fill" class="bar-fill hp-fill" style="width:100%"></div>
        </div>
        <span id="hp-bar-label" class="bar-val">100/100</span>
      </div>
      <div class="bar-row">
        <span class="bar-label">MP</span>
        <div class="bar-track">
          <div id="mp-bar-fill" class="bar-fill mp-fill" style="width:100%"></div>
        </div>
        <span id="mp-bar-label" class="bar-val">60/60</span>
      </div>
      <div class="bar-row">
        <span class="bar-label">XP</span>
        <div class="bar-track">
          <div id="xp-bar-fill" class="bar-fill xp-fill" style="width:0%"></div>
        </div>
        <span id="xp-bar-label" class="bar-val">0/100</span>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-item">⚔ ATK<br><span id="stat-atk">—</span></div>
      <div class="stat-item">🛡 DEF<br><span id="stat-def">—</span></div>
      <div class="stat-item">💰 GOLD<br><span id="stat-gold">—</span></div>
      <div class="stat-item">📍 ANDAR<br><span id="stat-floor">—</span></div>
    </div>

    <div class="panel-title" style="margin-top:6px">✨ STATUS</div>
    <div id="status-effects" class="status-area"></div>

    <div class="panel-title" style="margin-top:6px">⌨ ATALHOS</div>
    <div class="hotkeys-area">
      <div class="hotkey-row"><kbd>1</kbd> Atacar</div>
      <div class="hotkey-row"><kbd>2</kbd> Habilidade</div>
      <div class="hotkey-row"><kbd>3</kbd> Item</div>
      <div class="hotkey-row"><kbd>4</kbd> Fugir</div>
    </div>
  </aside>

  <!-- Battle log ──────────────────────────────────────────────────────── -->
  <div class="game-log panel">
    <div class="panel-title">📜 LOG DE BATALHA</div>
    <div id="battle-log" class="battle-log"></div>
  </div>

</div><!-- /game-layout -->

<!-- Game Over / Victory overlay -->
<div id="overlay" class="overlay hidden"></div>

<script src="game.js"></script>
</body>
</html>
